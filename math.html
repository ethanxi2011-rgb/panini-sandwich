<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math — panini-sandwich.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fdf6ec;
      color: #2d1a06;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(253, 246, 236, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e8d5b7;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: #4a2c0a;
      font-weight: 700;
      text-decoration: none;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    nav a {
      text-decoration: none;
      color: #7a5c3a;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: #c8922a; }
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: #4a2c0a;
      border-radius: 2px;
    }
    @media (max-width: 640px) {
      .nav-toggle { display: flex; }
      nav ul {
        display: none;
        position: fixed;
        top: 57px; left: 0; right: 0;
        background: rgba(253, 246, 236, 0.98);
        flex-direction: column;
        align-items: center;
        padding: 1rem 0 1.5rem;
        border-bottom: 1px solid #e8d5b7;
      }
      nav ul.open { display: flex; }
      nav ul li { width: 100%; text-align: center; }
      nav ul li a { display: block; padding: 0.75rem 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">🥪 Panini</a>
    <button class="nav-toggle" onclick="document.querySelector('nav ul').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="/" onclick="document.querySelector('nav ul').classList.remove('open')">Home</a></li>
      <li><a href="/dilophosaurus" onclick="document.querySelector('nav ul').classList.remove('open')">🦕 Dino</a></li>
      <li><a href="/math" onclick="document.querySelector('nav ul').classList.remove('open')">Math</a></li>
    </ul>
  </nav>

</body>
</html>
